[pytest]
# pytest.ini — global pytest configuration

# Where to find tests
testpaths = Tests

# Default options for every run:
#   -v                      = verbose (show each test name)
#   --tb=short              = short traceback on failure
#   --html=...              = generate HTML report automatically
#   --self-contained-html   = embeds CSS/JS/images into ONE file (easy to share)
addopts = -v --tb=short --html=Reports/report.html --self-contained-html

# Markers let you tag tests and run subsets
# Example: pytest -m smoke   (runs only smoke tests)
markers =
    smoke: Quick sanity checks (run these first)
    regression: Full regression suite
    negative: Negative / error-path tests
